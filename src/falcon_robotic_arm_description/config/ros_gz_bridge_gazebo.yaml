# *  Filename:       ros_gz_bridge_gazebo.yaml
# *  Description:    Minimal ros_gz_bridge config — forwards /clock only.
# *                  Used in launch configurations that need sim-time synchronisation
# *                  but handle /joint_states via a separate bridge entry or plugin.

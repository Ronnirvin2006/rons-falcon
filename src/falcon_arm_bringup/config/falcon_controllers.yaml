# *****************************************************************************************
# *  Filename:       falcon_controllers.yaml  (falcon_arm_bringup)
# *  Description:    ros2_control controller configuration for fake/real hardware mode.
# *                  Used by ros2_control_node launched from falcon_arm_bringup or
# *                  falcon_arm_hw.launch.py (i.e. NOT for Gazebo simulation).
# *
# *                  For Gazebo simulation the controller config is loaded from
# *                  falcon_robotic_arm_description/config/falcon_controllers.yaml
# *                  directly by the gz_ros2_control plugin.
# *
# *  Author:         BARGAVAN R - MIT
# *  Co-Author:      RON NIRVIN J
# *****************************************************************************************

controller_manager:
  ros__parameters:
    update_rate: 50  # 50Hz control loop
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: false

arm_controller:
  ros__parameters:
    use_sim_time: false
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
      joint_1:
        trajectory: 0.05
        goal: 0.05
      joint_2:
        trajectory: 0.05
        goal: 0.05
      joint_3:
        trajectory: 0.05
        goal: 0.05
      joint_4:
        trajectory: 0.05
        goal: 0.05
      joint_5:
        trajectory: 0.05
        goal: 0.05

gripper_controller:
  ros__parameters:
    use_sim_time: false
    joints:
      - gripper_joint_1
      - gripper_joint_2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
